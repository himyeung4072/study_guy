<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4a90e2">
  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <!-- iOS：加入主畫面變全螢幕 App -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Study Guy">
  <link rel="apple-touch-icon" href="assets/icon-192.svg">
  <title>Study Guy 溫習小幫手</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">📚 Study Guy</h1>
    <nav class="app-nav" id="app-nav"></nav>
  </header>

  <main id="app-main" class="app-main">
    <!-- 各 view 由 JS 動態插入 -->
    <div class="loading">載入中…</div>
  </main>

  <footer class="app-footer">
    <small>Study Guy · 本地溫習與考試系統</small>
  </footer>

  <!-- app.js 必須先載入以提供 SG.registerView -->
  <script src="assets/js/app.js" defer></script>
  <script src="assets/js/storage.js" defer></script>
  <script src="assets/js/content-loader.js" defer></script>
  <script src="assets/js/weakness-analyzer.js" defer></script>
  <script src="assets/js/exam-engine.js" defer></script>
  <script src="assets/js/views/home.js" defer></script>
  <script src="assets/js/views/study.js" defer></script>
  <script src="assets/js/views/exam.js" defer></script>
  <script src="assets/js/views/result.js" defer></script>
  <script src="assets/js/views/history.js" defer></script>
  <script src="assets/js/views/manage.js" defer></script>
</body>
</html>
